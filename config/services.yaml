# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.ai.gemini_api_key: '%env(default::GEMINI_API_KEY)%'
    app.ai.provider: '%env(default::AI_PROVIDER)%'
    app.igdb.client_id: '%env(default::IGDB_CLIENT_ID)%'
    app.igdb.client_secret: '%env(default::IGDB_CLIENT_SECRET)%'


services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    ai.platform.model_catalog.lmstudio:
        class: Symfony\AI\Platform\Bridge\LmStudio\ModelCatalog
        arguments:
            $additionalModels:
                mistralai/mistral-small-3.2:
                    class: Symfony\AI\Platform\Bridge\Generic\CompletionsModel
                    capabilities:
                        - !php/const Symfony\AI\Platform\Capability::INPUT_MESSAGES
                        - !php/const Symfony\AI\Platform\Capability::OUTPUT_TEXT
                        - !php/const Symfony\AI\Platform\Capability::OUTPUT_STREAMING
                        - !php/const Symfony\AI\Platform\Capability::TOOL_CALLING
                text-embedding-nomic-embed-text-v1.5:
                    class: Symfony\AI\Platform\Bridge\Generic\EmbeddingsModel
                    capabilities:
                        - !php/const Symfony\AI\Platform\Capability::INPUT_TEXT
                        - !php/const Symfony\AI\Platform\Capability::EMBEDDINGS

    App\Service\AiFeatureAvailability:
        arguments:
            $geminiApiKey: '%app.ai.gemini_api_key%'
            $lmStudioHostUrl: '%env(default::LMSTUDIO_HOST_URL)%'
            $appEnv: '%kernel.environment%'
            $aiProvider: '%app.ai.provider%'

    App\AI\ReviewDraftingService:
        arguments:
            $appEnv: '%kernel.environment%'
            $configuredProvider: '%app.ai.provider%'

    App\AI\PlayNextRecommendationService:
        arguments:
            $appEnv: '%kernel.environment%'
            $configuredProvider: '%app.ai.provider%'

    App\IGDB\IgdbClient:
        arguments:
            $clientId: '%app.igdb.client_id%'
            $clientSecret: '%app.igdb.client_secret%'
