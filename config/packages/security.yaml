security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            stateless: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\SyncTokenAuthenticator

    access_control:
        - { path: ^/api/me$, roles: ROLE_USER }
        - { path: ^/api/enrich$, roles: ROLE_USER }
        - { path: ^/api/ai/, roles: ROLE_USER }
