services:
  backend:
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://${BACKEND_DB_USER:-mio}:${BACKEND_DB_PASSWORD:-db}@db:3306/${BACKEND_DB_NAME:-mio_server}?serverVersion=8.0.32&charset=utf8mb4
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${BACKEND_HTTP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./_docker/backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${BACKEND_DB_ROOT_PASSWORD:-db}
      MYSQL_DATABASE: ${BACKEND_DB_NAME:-mio_server}
      MYSQL_USER: ${BACKEND_DB_USER:-mio}
      MYSQL_PASSWORD: ${BACKEND_DB_PASSWORD:-db}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${BACKEND_DB_ROOT_PASSWORD:-db}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:${BACKEND_DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
