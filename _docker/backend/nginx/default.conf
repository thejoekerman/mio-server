server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;

    # Sync POSTs the full library snapshot; align with PHP post_max_size (10M) so
    # large-but-legitimate snapshots aren't rejected with an opaque 413 (nginx
    # otherwise defaults to 1M and silently overrides the PHP setting).
    client_max_body_size 10m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/app_error.log;
    access_log /var/log/nginx/app_access.log;
}
