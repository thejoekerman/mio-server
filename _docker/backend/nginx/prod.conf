server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Sync POSTs the full library snapshot; align with PHP post_max_size (10M) so
    # large-but-legitimate snapshots aren't rejected with an opaque 413 (nginx
    # otherwise defaults to 1M and silently overrides the PHP setting).
    client_max_body_size 10m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
